<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: sans-serif;
            width: 220px;
            padding: 10px;
        }

        button {
            width: 100%;
            margin: 5px 0;
            padding: 8px;
        }

        input {
            width: 100%;
        }
    </style>
</head>

<body>
    <div style="text-align:center; margin-top:10px;">
        <img id="cover" width="100" />
        <div id="title"></div>
        <div id="artist" style="color:gray;"></div>
    </div>
    <button id="play">▶ / ⏸</button>
    <button id="next">⏭ Следующий</button>
    <button id="prev">⏮ Предыдущий</button>

    <label>Громкость</label>
    <input type="range" id="volume" min="0" max="1" step="0.05">

    <label>Прогресс</label>
    <input type="range" id="progress" min="0" max="1" step="0.01">

    <script src="popup.js"></script>
</body>

</html>
