<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Music Control</title>
</head>

<body>

    <h2>Music Panel</h2>

    <button onclick="play()">Play / Pause</button>
    <button onclick="pause()">Pause</button>
    <button onclick="next()">Next</button>

    <br><br>

    <label>Volume</label>
    <input id="vol" type="range" min="0" max="1" step="0.05" />

    <script src="index.js"></script>
</body>

</html>
